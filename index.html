<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vietnam Weather Forecast</title>
    <link rel="stylesheet" href="/index.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/index.js"></script>
  </head>
  <body>
    <div class="weather-card">
      <div class="search">
        <input
          type="text"
          placeholder="Nhập tên thành phố..."
          spellcheck="false"
          class="search-input"
        />
        <button class="search-button"><i class="fas fa-search"></i>Search</button>
      </div>

      <div class="weather">
        <img
          src="https://openweathermap.org/img/wn/10d@2x.png"
          class="weather-icon"
        />
        <h1 class="temp">--°C</h1>
        <h2 class="city">Chưa có thông tin</h2>

        <div class="details">
          <div class="col">
            <p class="humidity">--%</p>
            <p>Độ ẩm</p>
          </div>
          <div class="col">
            <p class="wind">-- km/h</p>
            <p>Tốc độ gió</p>
          </div>
        </div>
      </div>

      <div class="forecast-container">
        <h3>Dự báo 5 ngày tới</h3>
        <ul class="forecast-list"></ul>
      </div>
    </div>
  </body>
</html>
