<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự Báo Thời Tiết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./index.css">
    
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <div class="search-box">
                <h3 class="text-center mb-4">Tra Cứu Thời Tiết</h3>
                <div class="input-group">
                    <input type="text" id="cityInput" class="form-control form-control-lg" placeholder="Nhập tên thành phố (vd: Hanoi, Ho Chi Minh)">
                    <button class="btn btn-primary" id="searchBtn" type="button">
                        <i class="fas fa-search"></i> Tìm
                    </button>
                </div>
                <div id="errorMsg" class="text-danger mt-2 text-center" style="display: none;">Không tìm thấy thành phố này!</div>
            </div>

            <div class="weather-card" id="weatherResult">
                <div class="weather-header">
                    <h2 id="cityName">Thành Phố</h2>
                    <div class="weather-icon">
                        <img id="wIcon" src="" alt="Thời tiết">
                    </div>
                    <div class="temp-display"><span id="temp">0</span>°C</div>
                    <p class="text-capitalize fs-5 mb-0" id="description">Mô tả</p>
                </div>
                <div class="weather-body">
                    <div class="info-row">
                        <span class="text-muted"><i class="fas fa-tint"></i> Độ ẩm</span>
                        <strong id="humidity">0%</strong>
                    </div>
                    <div class="info-row">
                        <span class="text-muted"><i class="fas fa-wind"></i> Sức gió</span>
                        <strong id="windSpeed">0 m/s</strong>
                    </div>
                    <div class="info-row">
                        <span class="text-muted"><i class="fas fa-compress-arrows-alt"></i> Áp suất</span>
                        <strong id="pressure">0 hPa</strong>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="./index.js"></script>

</body>
</html>
