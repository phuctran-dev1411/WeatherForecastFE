<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thống Kê Thời Tiết Tháng</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./statistic.css" />
  </head>
  <body>
    <div class="location-banner text-center">
      <div class="container">
        <h1 id="statTitle">
          Thống Kê Thời Tiết: <span class="text-info">Cao Bằng</span>
        </h1>
        <p class="lead">Dữ liệu phân tích trong 30 ngày gần nhất</p>
      </div>
    </div>

    <div class="container">
      <div class="row mb-4">
        <div class="col-12">
          <div class="stats-card">
            <h4 class="mb-4">
              <i class="fas fa-microchip text-success"></i> Chỉ số chi tiết hôm
              nay
            </h4>
            <div class="row text-center">
              <div class="col-6 col-md-3 mb-3 border-end">
                <div class="p-2">
                  <i class="fas fa-thermometer-half fa-2x text-danger mb-2"></i>
                  <p class="text-muted mb-1">Nhiệt độ</p>
                  <h3 class="fw-bold" id="cardTemp">22°C</h3>
                </div>
              </div>
              <div class="col-6 col-md-3 mb-3 border-end">
                <div class="p-2">
                  <i class="fas fa-cloud-rain fa-2x text-primary mb-2"></i>
                  <p class="text-muted mb-1">Lượng mưa</p>
                  <h3 class="fw-bold" id="cardRain">5.2 mm</h3>
                </div>
              </div>
              <div class="col-6 col-md-3 mb-3 border-end">
                <div class="p-2">
                  <i class="fas fa-tint fa-2x text-info mb-2"></i>
                  <p class="text-muted mb-1">Độ ẩm</p>
                  <h3 class="fw-bold" id="cardHumidity">78%</h3>
                </div>
              </div>
              <div class="col-6 col-md-3 mb-3">
                <div class="p-2">
                  <i
                    id="cardSkyIcon"
                    class="fas fa-cloud fa-2x text-secondary mb-2"
                  ></i>
                  <p class="text-muted mb-1">Bầu trời</p>
                  <h3 class="fw-bold fs-5" id="cardSkyText">Nhiều mây</h3>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="stats-card">
            <h4 class="mb-4">
              <i class="fas fa-temperature-high text-danger"></i> Biến thiên
              Nhiệt độ (°C)
            </h4>
            <div class="chart-container">
              <canvas id="tempChart"></canvas>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="stats-card">
            <h4 class="mb-4">
              <i class="fas fa-cloud-showers-heavy text-primary"></i> Thống kê
              Lượng mưa (mm)
            </h4>
            <div class="chart-container">
              <canvas id="rainChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="statistic.js"></script>
  </body>
</html>
